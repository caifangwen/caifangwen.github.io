{{ define "main" }}
  <!-- 面包屑导航 -->
  {{ partial "navigation/breadcrumb.html" . }}

  <!-- 讨论标题 -->
  <header class="mb-4">
    <h1 class="text-foreground text-2xl font-bold md:text-3xl">
      {{ .Title }}
    </h1>
    {{ if .Params.slug }}
      <p class="text-muted-foreground text-sm">
        <span class="font-medium">Slug:</span> {{ .Params.slug }}
      </p>
    {{ end }}
  </header>

  <!-- 评论组件 -->
  {{ partial "features/comments.html" . }}

{{ end }}
