{{ define "main" }}
  <!-- 面包屑导航 -->
  {{ partial "navigation/breadcrumb.html" . }}

  <!-- 正文内容 -->
  <div class="prose prose-neutral dark:prose-invert max-w-none">
    {{ .Content }}
  </div>

  <!-- 返回分享列表 -->
  <div class="mt-8 pt-6 border-t border-border">
    <a href="{{ "/shares/" | relLangURL }}" class="text-primary hover:text-primary/80 inline-flex items-center gap-2 font-medium transition-colors">
      {{ partial "features/icon.html" (dict "name" "arrow-left" "size" "sm" "ariaLabel" "") }}
      <span>返回分享列表</span>
    </a>
  </div>

  <!-- 评论组件 -->
  {{ partial "features/comments.html" . }}
{{ end }}
